* "ChatGPT"

ai_usage_summary: |
ChatGPT was used for architecture discussions, code reviews,
debugging assistance, feature engineering ideas, and repository
documentation. All ranking logic, experimentation, optimization,
validation, and final system integration were performed manually by
the team. No external LLM APIs were used during candidate ranking.

# ============================================================================

# Approach summary

# ============================================================================

methodology_summary: |
Developed a production-style candidate ranking system combining
semantic retrieval, feature engineering, behavioral signals,
production ML evidence, company credibility, and honeypot detection.
Candidate profiles are parsed to extract AI, retrieval, evaluation,
leadership, and engagement signals. A deterministic hybrid scoring
framework ranks candidates while penalizing suspicious or inconsistent
profiles. Explainable reasoning is generated for every ranked
candidate. The system executes entirely on CPU without network access
and ranks 100,000 candidates in approximately 30 seconds.

